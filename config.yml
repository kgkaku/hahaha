requirements:
  - requests>=2.31.0
  - beautifulsoup4>=4.12.0
  - lxml>=4.9.0
  - pyyaml>=6.0

website:
  url: "https://www.aparatchi.com"
  timeout: 10
  retries: 3

stream:
  domains:
    - "gg.hls2.xyz"
    - "cdn.hls2.xyz"
    - "live.hls2.xyz"
  path_patterns:
    - "/live/{channel_id}/chunks.m3u8"
    - "/live/{channel_name}/chunks.m3u8"
    - "/hls/{channel_id}/stream.m3u8"
    - "/stream/{channel_id}.m3u8"
  session_param: "nimblesessionid"

output:
  m3u: "aparatchi.m3u"
  json: "aparatchi.json"
  include_headers: true
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

filters:
  min_name_length: 2
  max_name_length: 30
  exclude_patterns:
    - "login"
    - "register"
    - "contact"
    - "about"
    - "home"
    - "terms"
    - "privacy"
    - "dmca"
